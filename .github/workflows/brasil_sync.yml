name: Atualizar Resultados Brasileirão

on:
  schedule:
    - cron: '0 6 * * *' # Roda todos os dias às 06:00 UTC (03:00 no Brasil)
  workflow_dispatch:    # Permite rodar manualmente para testar agora

jobs:
  build:
    runs-on: ubuntu-latest
    # Adicionamos permissões explicitamente no código também por segurança
    permissions:
      contents: write
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Executar script Brasil
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          # Força o uso do Node 24 para eliminar o warning
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
        run: python update_brasil.py

      - name: Salvar alterações
        run: |
          git config --global user.name 'Professor Bot'
          git config --global user.email 'bot@github.com'
          git add brasil.csv
          git commit -m "Update brasil.csv com resultados de ontem" || exit 0
          git push