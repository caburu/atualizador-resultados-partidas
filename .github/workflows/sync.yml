name: Sync Results from Football-Data API

on:
  schedule:
    - cron: '0 */6 * * *' # Executa a cada 6 horas
  workflow_dispatch:      # Permite rodar manualmente pelo painel do GitHub

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run update script
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python update_results.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add resultados.csv
          git commit -m "Auto-update match results" || exit 0
          git push